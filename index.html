<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Code — Clinton</title>
<style>
  :root{
    --navy-950:#0a1628;
    --navy-900:#0f1f38;
    --navy-800:#142a4a;
    --gold-400:#e8b84b;
    --gold-300:#f0cc72;
    --ink-300:#8ea3c2;
    --ink-100:#e9eef7;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:radial-gradient(circle at 50% -10%, var(--navy-800), var(--navy-950) 60%);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:380px;
    background:linear-gradient(160deg, var(--navy-800), var(--navy-900));
    border:1px solid rgba(232,184,75,0.25);
    border-radius:20px;
    padding:36px 28px 30px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .logo{
    width:110px;
    height:auto;
    margin:0 auto 18px;
    display:block;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  }
  .eyebrow{
    color:var(--gold-400);
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:12px;
    font-weight:600;
    margin:0 0 6px;
  }
  h1{
    color:var(--ink-100);
    font-size:19px;
    font-weight:600;
    margin:0 0 26px;
  }
  h1 span{color:var(--gold-300);}
  .code-box{
    position:relative;
    background:var(--navy-950);
    border:1.5px dashed rgba(232,184,75,0.4);
    border-radius:14px;
    padding:22px 16px;
    cursor:pointer;
    transition:border-color .2s ease, transform .12s ease;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .code-box:active{transform:scale(0.98);}
  .code-box.copied{border-color:var(--gold-400); border-style:solid;}
  .code{
    font-family:'SF Mono','Courier New',monospace;
    font-size:34px;
    font-weight:700;
    letter-spacing:.08em;
    color:var(--ink-100);
    word-break:break-all;
  }
  .hint{
    margin-top:14px;
    font-size:13px;
    color:var(--ink-300);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:18px;
  }
  .hint svg{width:15px;height:15px;flex-shrink:0;}
  .hint.success{color:var(--gold-400); font-weight:600;}
  button.copy-btn{
    margin-top:22px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--gold-400);
    color:var(--navy-950);
    font-size:15px;
    font-weight:700;
    letter-spacing:.02em;
    cursor:pointer;
    transition:background .2s ease, transform .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  button.copy-btn:hover{background:var(--gold-300);}
  button.copy-btn:active{transform:scale(0.98);}
  button.copy-btn.copied{background:#5fbf7a; color:#0a1628;}
</style>
</head>

  <p class="eyebrow">Referral Code</p>
  <h1>Paul's Hero — <span>Clinton</span></h1>

  <div class="code-box" id="codeBox" role="button" tabindex="0" aria-label="Tap to copy referral code">
    <div class="code" id="codeText">NT9Y2ZJX</div>
  </div>
  <p class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Tap the code or button to copy
  </p>

  <button class="copy-btn" id="copyBtn">Copy Code</button>
</div>

<script>
  const code = "NT9Y2ZJX";
  const codeBox = document.getElementById('codeBox');
  const copyBtn = document.getElementById('copyBtn');
  const hint = document.getElementById('hint');

  async function copyCode(){
    try{
      await navigator.clipboard.writeText(code);
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = code;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    codeBox.classList.add('copied');
    copyBtn.classList.add('copied');
    copyBtn.textContent = 'Copied ✓';
    hint.classList.add('success');
    hint.innerHTML = 'Copied — ready to paste at checkout';

    setTimeout(()=>{
      codeBox.classList.remove('copied');
      copyBtn.classList.remove('copied');
      copyBtn.textContent = 'Copy Code';
      hint.classList.remove('success');
      hint.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Tap the code or button to copy';
    }, 2200);
  }

  codeBox.addEventListener('click', copyCode);
  codeBox.addEventListener('keypress', (e)=>{ if(e.key==='Enter' || e.key===' ') copyCode(); });
  copyBtn.addEventListener('click', copyCode);
</script>
